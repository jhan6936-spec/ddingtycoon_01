function getImagePath(text) {
  const candidates = getImagePathCandidates(text);
  return candidates[0] || '';
}

function handleImageFallback(imgEl) {
  if (!imgEl || !imgEl.dataset) return;
  const candidates = String(imgEl.dataset.imgCandidates || '').split('|').filter(Boolean);
  let idx = parseInt(imgEl.dataset.imgFallbackIndex || '0', 10);
  if (!Number.isFinite(idx)) idx = 0;
  idx += 1;
  if (idx < candidates.length) {
    imgEl.dataset.imgFallbackIndex = String(idx);
    imgEl.src = candidates[idx];
    return;
  }
  imgEl.onerror = null;
  imgEl.style.display = 'none';
}

function encodeAssetPath(path) {
  return String(path || '')
    .split('/')
    .map((seg) => {
      if (seg === '.' || seg === '..') return seg;
      return encodeURIComponent(seg);
    })
    .join('/');
}

function buildImageTag(name, alt = '', style = '', className = '') {
  const candidates = getImagePathCandidates(name);
  if (!candidates.length) return '';
  const safeAlt = String(alt || name || '').replace(/"/g, '&quot;');
  const safeCandidates = candidates.map((c) => encodeAssetPath(c).replace(/"/g, '&quot;')).join('|');
  const cls = className ? ` class="${className}"` : '';
  const styleAttr = style ? ` style="${style}"` : '';
  const src0 = encodeAssetPath(candidates[0]);
  return `<img src="${src0}" alt="${safeAlt}"${cls} data-img-candidates="${safeCandidates}" data-img-fallback-index="0"${styleAttr} decoding="async" loading="lazy" onerror="handleImageFallback(this)">`;
}

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function creditPhotoSrc(photo) {
  const p = String(photo || '').trim();
  if (!p) return '';
  if (/^https?:\/\//i.test(p)) return p;
  return encodeAssetPath(p);
}

function positionCalcPopupViewport(inputEl, popup) {
  const rect = inputEl.getBoundingClientRect();
  const margin = 10;
  const popupW = 280;
  const popupH = 420;

  let left = rect.right + margin;
  let top = rect.top;

  if (left + popupW > window.innerWidth - margin) {
    left = Math.max(margin, rect.left - popupW - margin);
  }
  if (top + popupH > window.innerHeight - margin) {
    top = Math.max(margin, window.innerHeight - popupH - margin);
  }

  popup.style.left = `${Math.round(left)}px`;
  popup.style.top = `${Math.round(top)}px`;
}

function positionCalcPopupAnchored(host, inputEl, popup) {
  const margin = 8;
  const hostRect = host.getBoundingClientRect();
  const inputRect = inputEl.getBoundingClientRect();
  const pw = popup.offsetWidth || 280;
  const ph = popup.offsetHeight || 400;

  let left = inputRect.right - hostRect.left + margin;
  let top = inputRect.top - hostRect.top;

  if (hostRect.left + left + pw > window.innerWidth - margin) {
    left = inputRect.left - hostRect.left - pw - margin;
  }
  if (left < margin) left = margin;

  const vSpaceBelow = window.innerHeight - inputRect.bottom;
  if (vSpaceBelow < 80 && inputRect.top - hostRect.top > ph * 0.35) {
    top = Math.max(margin, inputRect.bottom - hostRect.top - ph - margin);
  }

  popup.style.left = `${Math.round(left)}px`;
  popup.style.top = `${Math.round(top)}px`;
}

function bindCalcPopupResizeOnly(handler) {
  unbindCalcPopupResizeOnly();
  if (!handler) return;
  calcState._calcResizeHandler = handler;
  window.addEventListener('resize', handler);
}

function unbindCalcPopupResizeOnly() {
  const h = calcState._calcResizeHandler;
  if (h) window.removeEventListener('resize', h);
  calcState._calcResizeHandler = null;
}

function parkCalcPopupOnBody() {
  const popup = document.getElementById('calcPopup');
  if (!popup) return;
  unbindCalcPopupResizeOnly();
  popup.classList.remove('calc-popup--anchored');
  popup.classList.add('calc-popup--fixed');
  popup.style.left = '';
  popup.style.top = '';
  document.body.appendChild(popup);
}

function openCalculatorForInput(inputEl) {
  if (warehouseSetViewEnabled() && inputEl && inputEl.closest && inputEl.closest('#warehouseContainer')) {
    return;
  }
  ensureCalcPopup();

  const popup = document.getElementById('calcPopup');
  if (!popup) return;

  calcState.isOpen = true;
  calcState.targetInput = inputEl;
  calcState.materialName = inputEl.getAttribute('data-material') || '?ҳлҹү ?…л Ҙ';

  calcState.countExpr = '';
  calcState.setExpr = '';
  calcState.remExpr = '';
  calcState.activePart = calcState.mode === 'count' ? 'count' : 'set';
  syncCalcDisplay();

  const cm = calcState.commitMode === 'add' ? 'add' : 'apply';
  popup.querySelectorAll('#calcCommitModes [data-commit]').forEach((b) => {
    b.classList.toggle('active', b.getAttribute('data-commit') === cm);
  });

  const host = inputEl.closest('.warehouse-item');
  if (host) {
    popup.classList.remove('calc-popup--fixed');
    popup.classList.add('calc-popup--anchored');
    host.appendChild(popup);
    popup.style.display = 'block';
    const layout = () => positionCalcPopupAnchored(host, inputEl, popup);
    requestAnimationFrame(() => {
      layout();
      requestAnimationFrame(layout);
    });
    bindCalcPopupResizeOnly(layout);
  } else {
    parkCalcPopupOnBody();
    popup.style.display = 'block';
    positionCalcPopupViewport(inputEl, popup);
    bindCalcPopupResizeOnly(() => positionCalcPopupViewport(inputEl, popup));
  }

  const titleEl = document.getElementById('calcTitle');
  if (titleEl) titleEl.textContent = calcState.materialName;
}

function closeCalculator() {
  calcState.isOpen = false;
  calcState.targetInput = null;
  calcState.materialName = '';
  calcState.countExpr = '';
  calcState.setExpr = '';
  calcState.remExpr = '';
  calcState.activePart = 'count';
  const popup = document.getElementById('calcPopup');
  if (popup) {
    popup.style.display = 'none';
    parkCalcPopupOnBody();
  }
}

function handleCalcKey(key) {
  if (key === 'C') {
    if (calcState.mode === 'count') calcState.countExpr = '';
    else if (calcState.activePart === 'rem') calcState.remExpr = '';
    else calcState.setExpr = '';
    syncCalcDisplay();
    return;
  }
  if (key === 'BS') {
    if (calcState.mode === 'count') {
      calcState.countExpr = calcState.countExpr.slice(0, -1);
    } else {
      if (calcState.activePart === 'rem') calcState.remExpr = calcState.remExpr.slice(0, -1);
      else calcState.setExpr = calcState.setExpr.slice(0, -1);
    }
    syncCalcDisplay();
    return;
  }
  if (calcState.mode === 'count') {
    calcState.countExpr += key;
  } else {
    if (calcState.activePart === 'rem') calcState.remExpr += key;
    else calcState.setExpr += key;
  }

  // ?ёнҠё лӘЁл“ң "к°??…л Ҙ"?Җ 0~63 лІ”мң„л§??Ҳмҡ© (?«мһҗл§??ЁлҸ… ?…л Ҙ??кІҪмҡ° мҰүмӢң ?ңн•ң)
  if (calcState.mode === 'set' && calcState.activePart === 'rem') {
    const trimmed = (calcState.remExpr || '').trim();
    if (/^\d+$/.test(trimmed)) {
      const n = parseInt(trimmed, 10);
      if (Number.isFinite(n) && n >= SET_SIZE) {
        calcState.remExpr = '63';
      }
    }
  }
  syncCalcDisplay();
}

function sanitizeExpr(expr) {
  // ?Ҳмҡ©: ?«мһҗ, кіөл°ұ, + - * / ( ) .
  const cleaned = (expr || '')
    .replace(/[Г—]/g, '*')
    .replace(/[Г·]/g, '/')
    .replace(/[^0-9+\-*/().\s]/g, '')
    .trim();
  return cleaned;
}

function safeEval(expr) {
  const cleaned = sanitizeExpr(expr);
  if (!cleaned) return 0;
  // ?°мҶҚ ?°мӮ°??к°ҷм? ?Јм???JSк°Җ мІҳлҰ¬?ҳм?л§? ?ӨлҘҳ??0?јлЎң
  try {
    // eslint-disable-next-line no-new-func
    const v = Function(`"use strict"; return (${cleaned});`)();
    if (typeof v !== 'number' || !Number.isFinite(v)) return null;
    return v;
  } catch {
    return null;
  }
}

function toNonNegativeInt(v) {
  if (v === null) return null;
  const n = Math.floor(v);
  if (!Number.isFinite(n)) return null;
  return Math.max(0, n);
}

function getTotalCountFromState() {
  if (calcState.mode === 'count') {
    const raw = safeEval(calcState.countExpr);
    return toNonNegativeInt(raw);
  }
  const setRaw = safeEval(calcState.setExpr);
  const remRaw = safeEval(calcState.remExpr);
  if (setRaw === null || remRaw === null) return null;
  const sets = toNonNegativeInt(setRaw);
  const rem = toNonNegativeInt(remRaw);
  if (sets === null || rem === null) return null;
  if (rem >= SET_SIZE) return null;
  return Math.max(0, sets * SET_SIZE + rem);
}

function getCalcResultValue() {
  return getTotalCountFromState();
}

function syncCalcDisplay() {
  const exprEl = document.getElementById('calcExpr');
  const resultEl = document.getElementById('calcResult');
  const partModes = document.getElementById('calcPartModes');

  if (calcState.mode === 'set') {
    if (partModes) partModes.style.display = 'grid';
    const setText = (calcState.setExpr || '0');
    const remText = (calcState.remExpr || '0');
    if (exprEl) exprEl.textContent = `${setText}?ёнҠё ${remText}к°?;

    // part лІ„нҠј active ліҙм •
    if (partModes) {
      partModes.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = partModes.querySelector(`.mode-btn[data-part="${calcState.activePart === 'rem' ? 'rem' : 'set'}"]`);
      if (activeBtn) activeBtn.classList.add('active');
    }
  } else {
    if (partModes) partModes.style.display = 'none';
    if (exprEl) exprEl.textContent = calcState.countExpr || ' ';
  }

  if (resultEl) {
    const v = getCalcResultValue();
    if (v === null) {
      resultEl.textContent = '?ӨлҘҳ';
      resultEl.style.color = '#d94a4a';
    } else {
      resultEl.textContent = String(v);
      resultEl.style.color = '#4a8fd9';
    }
  }
}

function convertCalcMode(nextMode) {
  if (nextMode === 'set') {
    // count -> set (мҙ?к°ңмҲҳлҘ?n?ёнҠё mк°ңлЎң)
    const raw = safeEval(calcState.countExpr);
    const total = toNonNegativeInt(raw);
    if (total === null) {
      calcState.setExpr = '';
      calcState.remExpr = '';
      return;
    }
    const sets = Math.floor(total / SET_SIZE);
    const rem = total % SET_SIZE;
    calcState.setExpr = String(sets);
    calcState.remExpr = String(rem);
    return;
  }

  // set -> count (n?ёнҠё mк°ңл? мҙ?к°ңмҲҳлЎ?
  const total = getTotalCountFromState();
  if (total === null) {
    calcState.countExpr = '';
    return;
  }
  calcState.countExpr = String(total);
}

function commitCalcValue(action) {
  if (!calcState.targetInput) return false;

  const inputEl = calcState.targetInput;

  let current = parseInt(inputEl.getAttribute('data-warehouse-count'), 10);
  if (!Number.isFinite(current)) current = parseInt(inputEl.value, 10) || 0;
  const computed = getCalcResultValue();
  if (computed === null) return false;

  if (action === 'apply') {
    inputEl.setAttribute('data-warehouse-count', String(computed));
    if (warehouseSetViewEnabled()) {
      inputEl.value = formatWarehouseStackCount(computed);
    } else {
      inputEl.value = String(computed);
    }
  } else if (action === 'add') {
    const next = Math.max(0, current + computed);
    inputEl.setAttribute('data-warehouse-count', String(next));
    if (warehouseSetViewEnabled()) {
      inputEl.value = formatWarehouseStackCount(next);
    } else {
      inputEl.value = String(next);
    }
  } else if (action === 'reset') {
    inputEl.value = '0';
    inputEl.setAttribute('data-warehouse-count', '0');
    if (warehouseSetViewEnabled()) {
      inputEl.value = formatWarehouseStackCount(0);
    }
    calcState.countExpr = '';
    calcState.setExpr = '';
    calcState.remExpr = '';
    syncCalcDisplay();
  }

  saveWarehouseInventory();
  analyzeEfficiency();
  return true;
}

    i.setAttribute('data-warehouse-count', '0');

function extractDiscordProfile(user) {
  if (!user) return { name: '?¬мҡ©??, avatarUrl: '' };
  const meta = user.user_metadata || {};
  let name =
    meta.full_name ||
    meta.name ||
    meta.preferred_username ||
    meta.user_name ||
    meta.custom_claims?.global_name ||
    meta.custom_claims?.username ||
    user.email ||
    'Discord ?¬мҡ©??;
  let avatarUrl = meta.avatar_url || meta.picture || '';

  const identities = user.identities || [];
  const discordIdentity = identities.find((i) => i.provider === 'discord');
  const idData = discordIdentity && discordIdentity.identity_data ? discordIdentity.identity_data : {};
  if (idData.full_name) name = idData.full_name;
  else if (idData.name) name = idData.name;
  else if (idData.global_name) name = idData.global_name;
  else if (idData.username) name = idData.username;
  if (idData.avatar_url) avatarUrl = idData.avatar_url;

  const discordSnowflake =
    idData.sub ||
    idData.provider_id ||
    (discordIdentity && discordIdentity.identity_id) ||
    '';

  if (!avatarUrl && idData.avatar && discordSnowflake) {
    avatarUrl = `https://cdn.discordapp.com/avatars/${discordSnowflake}/${idData.avatar}.png?size=64`;
  }
  return { name, avatarUrl };
}

async function authSignOut() {
  authUiNonce++;
  closeProfileSettingsModal();

  const sb = getSupabaseClient();
  if (sb) {
    const runSignOut = async () => {
      const { error: errLocal } = await sb.auth.signOut({ scope: 'local' });
      if (errLocal) {
        console.warn('[Supabase Auth] signOut(local):', errLocal.message);
        const { error: err2 } = await sb.auth.signOut();
        if (err2) console.warn('[Supabase Auth] signOut:', err2.message);
      }
    };
    try {
      await Promise.race([
        runSignOut(),
        new Promise((_, reject) =>
          setTimeout(() => reject(Object.assign(new Error('timeout'), { code: 'SIGNOUT_TIMEOUT' })), 2800)
        )
      ]);
    } catch (e) {
      if (e && e.code !== 'SIGNOUT_TIMEOUT' && e.message !== 'timeout') {
        console.warn('[Supabase Auth] signOut кІҪкі :', e.message || e);
      }
    }
  }

  clearSupabaseAuthStorage();
  try {
    supabaseAuthClient = null;
  } catch (_) {}
  window.location.replace(window.location.origin + '/?logout=' + Date.now());
}

let marineGuideSlideIndex = 0;

function syncMarineGuideSlideWidths() {
  const viewport = document.getElementById('marineGuideViewport');
  const track = document.getElementById('marineGuideTrack');
  if (!viewport || !track) return;
  const w = viewport.offsetWidth;
  /* ?ЁкІЁм§??№м…ҳ(display:none)?җм„ң???Ҳл№„к°Җ 0 ???¬лқј?ҙл“ңлҘ?0pxлЎ?кі м •?ҳл©ҙ ?ҙл?м§Җк°Җ ліҙмқҙм§Җ ?ҠмқҢ */

  track.querySelectorAll('.marine-guide-slide').forEach((el) => {
    el.style.flex = `0 0 ${w}px`;
    el.style.width = `${w}px`;
  });
}

function applyMarineGuideSlide() {
  const viewport = document.getElementById('marineGuideViewport');
  const track = document.getElementById('marineGuideTrack');
  const counter = document.getElementById('marineGuideSlideCounter');
  if (!viewport || !track) return;
  const slideEls = track.querySelectorAll('.marine-guide-slide');
  const slideCount = slideEls.length || MARINE_GUIDE_SLIDES.length;
  if (slideCount > 0 && marineGuideSlideIndex >= slideCount) {
    marineGuideSlideIndex = slideCount - 1;
  }
  syncMarineGuideSlideWidths();
  const w = viewport.offsetWidth || 0;
  if (w >= 2) {
    track.style.transform = `translateX(${-marineGuideSlideIndex * w}px)`;
  }
  if (counter) counter.textContent = `${marineGuideSlideIndex + 1} / ${slideCount}`;

  applyMarineGuideSlide();

function setupMarineGuideResizeObserver() {
  const viewport = document.getElementById('marineGuideViewport');
  if (!viewport || viewport.__marineGuideRo) return;
  viewport.__marineGuideRo = true;
  if (typeof ResizeObserver === 'undefined') return;
  const ro = new ResizeObserver(() => {
    if (viewport.__marineGuideRoRaf) cancelAnimationFrame(viewport.__marineGuideRoRaf);
    viewport.__marineGuideRoRaf = requestAnimationFrame(() => {
      viewport.__marineGuideRoRaf = 0;
      applyMarineGuideSlide();
    });
  });
  ro.observe(viewport);
}

function initMarineGuideCarousel() {
  const track = document.getElementById('marineGuideTrack');
  if (!track || track.getAttribute('data-built') === '1') return;
  track.innerHTML = '';
  track.__mgBuildGen = (track.__mgBuildGen | 0) + 1;
  const buildGen = track.__mgBuildGen;

  function appendMarineSlide(slide, idx) {
    const wrap = document.createElement('div');
    wrap.className = 'marine-guide-slide';
    const img = document.createElement('img');
    img.src = slide.src;
    img.alt = slide.alt;
    img.loading = idx === 0 ? 'eager' : 'lazy';
    img.decoding = 'async';
    if (idx === 0) img.setAttribute('fetchpriority', 'high');
    img.draggable = false;
    wrap.appendChild(img);
    track.appendChild(wrap);
  }

  appendMarineSlide(MARINE_GUIDE_SLIDES[0], 0);
  applyMarineGuideSlide();

  let idx = 1;
  const MG_APPEND_BUDGET_MS = 6;
  function appendRest() {
    if (track.__mgBuildGen !== buildGen) return;
    const t0 = performance.now();
    while (idx < MARINE_GUIDE_SLIDES.length && performance.now() - t0 < MG_APPEND_BUDGET_MS) {
      appendMarineSlide(MARINE_GUIDE_SLIDES[idx], idx);
      idx += 1;
    }
    applyMarineGuideSlide();
    if (idx < MARINE_GUIDE_SLIDES.length) {

let viewerState = { key: 'seaweed', index: 0 };

function setupFactoryViewerOnce() {
  const overlay = document.getElementById('factoryViewer');
  if (!overlay || overlay.getAttribute('data-ready') === '1') return;
  overlay.setAttribute('data-ready', '1');

  const closeBtn = document.getElementById('viewerClose');
  const prevBtn = document.getElementById('viewerPrev');
  const nextBtn = document.getElementById('viewerNext');
  const stage = document.getElementById('viewerStage');

  function onOverlayClick(e) {
    if (e.target === overlay) closeFactoryViewer();
  }
  overlay.addEventListener('click', onOverlayClick);
  if (closeBtn) closeBtn.addEventListener('click', closeFactoryViewer);
  if (prevBtn) prevBtn.addEventListener('click', () => moveFactoryViewer(-1));
  if (nextBtn) nextBtn.addEventListener('click', () => moveFactoryViewer(1));
  if (stage) {
    stage.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'viewerImg') return;
    });
  }

  document.addEventListener('keydown', (e) => {
    const ov = document.getElementById('factoryViewer');
    if (!ov || !ov.classList.contains('open')) return;
    if (e.key === 'Escape') closeFactoryViewer();
    if (e.key === 'ArrowLeft') moveFactoryViewer(-1);
    if (e.key === 'ArrowRight') moveFactoryViewer(1);
  });
}

function openFactoryViewer(key, index) {
  setupFactoryViewerOnce();
  const overlay = document.getElementById('factoryViewer');
  if (!overlay) return;

  const items = factoryMedia[key] || [];
  if (!items.length) return;

  viewerState = { key, index: ((index % items.length) + items.length) % items.length };
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  renderFactoryViewerFrame();
}

function closeFactoryViewer() {
  const overlay = document.getElementById('factoryViewer');
  if (!overlay) return;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function moveFactoryViewer(delta) {
  const items = factoryMedia[viewerState.key] || [];
  if (!items.length) return;
  viewerState.index = (viewerState.index + delta + items.length) % items.length;
  renderFactoryViewerFrame();
}

function renderFactoryViewerFrame() {
  const items = factoryMedia[viewerState.key] || [];
  const it = items[viewerState.index];
  if (!it) return;

  const img = document.getElementById('viewerImg');
  const title = document.getElementById('viewerTitle');
  const step = document.getElementById('viewerStep');
  const total = document.getElementById('viewerTotal');
  const srcEl = document.getElementById('viewerSrc');

  const kindLabel = viewerState.key === 'tunicate' ? 'л¶Ҳмҡ°?ҒмүҘ??кіөмһҘ' : '?ҙмҙҲ кіөмһҘ';
  if (title) title.textContent = `${kindLabel} - ?Ёкі„ ${it.title}`;
  if (step) step.textContent = String(viewerState.index + 1);
  if (total) total.textContent = String(items.length);
  if (srcEl) srcEl.textContent = it.src;

  if (img) {
    img.alt = `${kindLabel} ?Ёкі„ ${it.title}`;
    img.src = it.src;
  }
}

/** ?ңмһ‘В·мЎ°н•©лІ? data.materials мӨ??°кёҲ ?Ёкі„(?•мҲҳВ·?өВ·м—җ?јмҠӨВ·кІ°м •В·?ҳлҰӯ?ңВ·мҳҒ?? ?„мқҙ?????ҙнҢЁлҘ????№кёү ?ңмҷё */
function isMaterialsTabAlchemyChainItem(name) {
  if (/^(кө??Ңлқј|л¬ём–ҙ|лҜём—ӯ|?ұкІҢ)\s+??$/.test(name)) return false;
  return /(?•мҲҳ|???җм„ј??кІ°м •|?ҳлҰӯ???Ғм•Ҫ)\s+??.test(name);
}

/** ?°кёҲ ?Ёкі„лі?л¶„лҘҳ(?ңмһ‘В·мЎ°н•©лІ?`partitionMiscAlchemyRecipes`?Җ ?ҷмқј к·ңм№ҷВ·?ңм„ң) */
function partitionAlchemyChainTotalsByCategory(totalsObj) {
  const meta = [
    { title: '?•мҲҳ', test: (n) => /?•мҲҳ\s+??/.test(n) },
    { title: '??, test: (n) => /??s+??/.test(n) },
    { title: '?җм„ј??, test: (n) => /?җм„ј??s+?…вҳ…$/.test(n) },
    { title: 'кІ°м •', test: (n) => /кІ°м •\s+?…вҳ…$/.test(n) },
    { title: '?ҳлҰӯ??, test: (n) => /?ҳлҰӯ??s+?…вҳ…??/.test(n) },
    { title: '?Ғм•Ҫ', test: (n) => /?Ғм•Ҫ\s+?…вҳ…??/.test(n) },
  ];
  const cols = meta.map((m) => ({ title: m.title, obj: {} }));
  const other = {};
  Object.entries(totalsObj || {}).forEach(([name, c]) => {
    if (!c || c <= 0) return;
    const i = meta.findIndex((m) => m.test(name));
    if (i >= 0) cols[i].obj[name] = c;
    else other[name] = c;
  });
  const out = cols.filter((col) => Object.keys(col.obj).length > 0);
  if (Object.keys(other).length > 0) out.push({ title: 'кё°н?', obj: other });
  return out;
}

/** 1В·2В·3???°кёҲ???¬лЈҢ(?•мҲҳВ·??/ ?җм„ј?ӨВ·кІ°??/ ?ҳлҰӯ?ңВ·мҳҒ?? */
const ALCHEMY_STAR_TIER_GROUPS = [
  { title: '1???°кёҲ???¬лЈҢ', typeTitles: ['?•мҲҳ', '??] },
  { title: '2???°кёҲ???¬лЈҢ', typeTitles: ['?җм„ј??, 'кІ°м •'] },
  { title: '3???°кёҲ???¬лЈҢ', typeTitles: ['?ҳлҰӯ??, '?Ғм•Ҫ'] },
];

function partitionAlchemyChainByStarTier(totalsObj) {
  const cols = partitionAlchemyChainTotalsByCategory(totalsObj);
  const tiers = ALCHEMY_STAR_TIER_GROUPS.map((tier) => ({
    title: tier.title,
    cols: cols.filter((c) => tier.typeTitles.includes(c.title)),
  })).filter((t) => t.cols.some((c) => Object.keys(c.obj).length > 0));
  const otherCol = cols.find((c) => c.title === 'кё°н?');
  if (otherCol && Object.keys(otherCol.obj).length > 0) {
    tiers.push({ title: 'кё°н? ?°кёҲ???¬лЈҢ', cols: [otherCol] });
  }
  return tiers;
}

/** кё°н? ?°кёҲ??materials) ???•мҲҳВ·?өВ·м—җ?јмҠӨВ·кІ°м •В·?ҳлҰӯ?ңВ·мҳҒ??*/
function partitionMiscAlchemyRecipes(recipes) {
  const sortKo = (a, b) => a.name.localeCompare(b.name, 'ko');
  const tiers = [
    { title: '?•мҲҳ', items: recipes.filter((r) => /?•мҲҳ\s+??/.test(r.name)).sort(sortKo) },
    { title: '??, items: recipes.filter((r) => /??s+??/.test(r.name)).sort(sortKo) },
    { title: '?җм„ј??, items: recipes.filter((r) => /?җм„ј??s+?…вҳ…$/.test(r.name)).sort(sortKo) },
    { title: 'кІ°м •', items: recipes.filter((r) => /кІ°м •\s+?…вҳ…$/.test(r.name)).sort(sortKo) },
    { title: '?ҳлҰӯ??, items: recipes.filter((r) => /?ҳлҰӯ??s+?…вҳ…??/.test(r.name)).sort(sortKo) },
    { title: '?Ғм•Ҫ', items: recipes.filter((r) => /?Ғм•Ҫ\s+?…вҳ…??/.test(r.name)).sort(sortKo) }
  ];
  const used = new Set();
  tiers.forEach((t) => t.items.forEach((r) => used.add(r.name)));
  const other = recipes.filter((r) => !used.has(r.name)).sort(sortKo);
  if (other.length) tiers.push({ title: 'кё°н?', items: other });
  return tiers;
}

}

function partitionVanillaNamesForWarehouse(namesArr) {
  const minerals = [];
  const vanillaFish = [];
  const coralSea = [];
  const leaves = [];
  const other = [];
  (namesArr || []).forEach((name) => {
    const b = classifyVanillaWarehouseBucket(name);
    if (b === 'minerals') minerals.push(name);

    else if (b === 'coralSea') coralSea.push(name);
    else if (b === 'leaves') leaves.push(name);
    else other.push(name);
  });
  const sortKo = (a, b) => a.localeCompare(b, 'ko');
  minerals.sort(sortKo);
  vanillaFish.sort(sortKo);
  coralSea.sort(sortKo);
  leaves.sort(sortKo);
  other.sort(sortKo);
  return { minerals, vanillaFish, coralSea, leaves, other };
}

function formatWarehouseStackCount(total) {
  const n = Math.max(0, Math.floor(Number(total) || 0));
  if (n === 0) return '0к°?;
  const sets = Math.floor(n / SET_SIZE);
  const rem = n % SET_SIZE;
  if (sets === 0) return `${rem}к°?;
  if (rem === 0) return `${sets}?ёнҠё`;
  return `${sets}?ёнҠё ${rem}к°?;
}

function formatAlchemySummaryBoxSetPiece(total) {
  const n = Math.max(0, Math.floor(Number(total) || 0));
  if (n === 0) return '0к°?;
  const perBox = ALCHEMY_BOX_SETS * SET_SIZE;
  const boxes = Math.floor(n / perBox);
  let r = n % perBox;
  const sets = Math.floor(r / SET_SIZE);
  const rem = r % SET_SIZE;
  const parts = [];
  if (boxes > 0) parts.push(`${boxes}?Ғмһҗ`);
  if (sets > 0) parts.push(`${sets}?ёнҠё`);
  if (rem > 0) parts.push(`${rem}к°?);
  return parts.length ? parts.join(' ') : '0к°?;
}

  const planMap = {};

  });
  const buckets = [
    { title: '1???°кёҲ???¬лЈҢ', shell: {}, vanilla: {} },

  const diluentCnt = planMap['м¶”м¶ң???¬м„қ??] || 0;

      if (!craftable.has(input.name)) base.add(input.name);

  (data.recipes || []).forEach(recipe => {

function renderExperts() {
  const container = document.getElementById('expertsContainer');
  if (!container) return;
  container.innerHTML = '';

  Object.values(expertMeta).forEach((meta) => {
    const lv = expertState[meta.key] || 0;
    const value = meta.values[lv] || 0;
    const unit = (meta.key === 'timeReduce') ? '% к°җмҶҢ'
      : ((meta.key.includes('Slots') || meta.key === 'oceanOrder') ? '' : '%');
    const card = document.createElement('div');
    card.className = 'expert-card';
    card.innerHTML = `
      <div class="expert-name">${meta.name}</div>
      <div class="expert-desc">${meta.desc}</div>
      <div class="expert-controls">
        <button class="expert-btn" type="button" data-expert="${meta.key}" data-delta="-1">??/button>
        <div class="expert-level">Lv.${lv} (${value}${unit})</div>
        <button class="expert-btn" type="button" data-expert="${meta.key}" data-delta="1">+</button>
      </div>
    `;
    container.appendChild(card);
  });

  container.querySelectorAll('button[data-expert]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-expert');
      const delta = parseInt(btn.getAttribute('data-delta'), 10) || 0;
      changeExpertLevel(key, delta);
    });
  });
}

function changeExpertLevel(key, delta) {
  const meta = expertMeta[key];
  if (!meta) return;
  const next = Math.max(0, Math.min(meta.maxLevel, (expertState[key] || 0) + delta));
  if (next === expertState[key]) return;
  expertState[key] = next;
  saveExpertState();
  renderExperts();
  analyzeEfficiency();
  renderRecipes();
}

function getExpertEffects() {
  const craftPriceBoost = expertMeta.craftPrice.values[expertState.craftPrice] || 0;
  const alchemyPriceBoost = expertMeta.alchemyPrice.values[expertState.alchemyPrice] || 0;
  const timeReduce = expertMeta.timeReduce.values[expertState.timeReduce] || 0;
  return { craftPriceBoost, alchemyPriceBoost, timeReduce };
}

function deductCraftTree(name, count, inv, options = {}) {
  if (!count || count <= 0) return;
  const skip = options.skipShellfishTierConvert === true;
  const recipe = data.materials[name];
  if (recipe && recipe.inputs && recipe.inputs.length) {
    if (skip && SHELLFISH_DOWNGRADE_ONE_STAR.has(name)) {
      inv[name] = (inv[name] || 0) - count;
      return;
    }
    for (const inp of recipe.inputs) {
      deductCraftTree(inp.name, inp.count * count, inv, options);
    }
  } else {
    inv[name] = (inv[name] || 0) - count;
  }
}

  if (!count || count <= 0) return;
  const skip = options.skipShellfishTierConvert === true;

    if (skip && SHELLFISH_DOWNGRADE_ONE_STAR.has(name)) {

      return;
    }
    for (const inp of recipe.inputs) {
      accumulateCraftTree(inp.name, inp.count * count, accum, options);
    }
  } else {
    accum[name] = (accum[name] || 0) + count;
  }
}

function unitAlchemyEfficiency(recipe, effects) {
  const priceMultiplier = 1 + (effects.alchemyPriceBoost / 100);
  const adjustedPrice = Math.round((recipe.price || 0) * priceMultiplier);
  const baseTimeSec = getBaseAlchemyTimeSec(recipe.name);
  const adjustedTimeSec = Math.max(1, baseTimeSec * (1 - effects.timeReduce / 100));
  const adjustedTimeMin = adjustedTimeSec / 60;
  return adjustedTimeMin > 0 ? adjustedPrice / adjustedTimeMin : 0;
}

function greedyCraftFinalCounts(recipeNames, inv, options = {}) {
  const includeDiluentCandidate = options.includeDiluentCandidate === true;
  const counts = {};
  recipeNames.forEach((n) => {
    counts[n] = 0;
  });
  let diluentCount = 0;
  const effects = getExpertEffects();
  const craftOpts = { skipShellfishTierConvert: true };
  const dRecipe = includeDiluentCandidate ? data.recipes.find((r) => r.name === 'м¶”м¶ң???¬м„қ??) : null;

  const guard = 200000;
  let iter = 0;
  while (iter++ < guard) {
    const craftable = [];
    for (const name of recipeNames) {
      const recipe = data.recipes.find((r) => r.name === name);
      if (!recipe) continue;
      if (calculateMaxCraft(recipe, inv, {}, craftOpts) < 1) continue;
      craftable.push(recipe);
    }
    if (dRecipe && calculateMaxCraft(dRecipe, inv, {}, craftOpts) >= 1) {
      craftable.push(dRecipe);
    }
    if (!craftable.length) break;

    let bestRecipe = null;
    let bestPrice = -1;
    let bestEff = -1;
    for (const r of craftable) {
      const p = getAlchemyBoostedSellPriceGold(r);
      const unitGold = p != null && Number.isFinite(p) ? p : 0;
      const s = unitAlchemyEfficiency(r, effects);
      if (
        bestRecipe === null ||
        unitGold > bestPrice ||
        (unitGold === bestPrice &&
          (s > bestEff || (s === bestEff && r.name.localeCompare(bestRecipe.name, 'ko') < 0)))
      ) {

function optimizeAlchemyPlanGreedy(inv) {
  const tierGroups = [{ names: FINAL_GROUP1 }, { names: FINAL_GROUP2 }, { names: FINAL_GROUP3 }];
  const permutations = [
    [0, 1, 2],
    [0, 2, 1],
    [1, 0, 2],
    [1, 2, 0],
    [2, 0, 1],
    [2, 1, 0],
  ];
  const effects = getExpertEffects();
  let best = packAlchemyPlanResult({});
  let bestGold = -1;

  function tryTierOrder(order, srcInv) {
    const invCopy = { ...srcInv };
    const merged = {};
    let dCount = 0;
    for (const idx of order) {
      const { counts, diluentCount: dPart } = greedyCraftFinalCounts(tierGroups[idx].names, invCopy, {
        includeDiluentCandidate: true,
      });
      Object.assign(merged, counts);
      dCount += dPart;
    }
    merged['м¶”м¶ң???¬м„қ??] = dCount;
    return packAlchemyPlanResult(merged);
  }

  for (const perm of permutations) {
    const packed = tryTierOrder(perm, inv);
    const gold = alchemyPlanTotalGold(packed, effects);
    if (gold > bestGold) {
      bestGold = gold;
      best = packed;
    }
  }

  const invGlobal = { ...inv };
  const allFinals = [...FINAL_GROUP1, ...FINAL_GROUP2, ...FINAL_GROUP3];
  const { counts, diluentCount } = greedyCraftFinalCounts(allFinals, invGlobal, {
    includeDiluentCandidate: true,
  });
  const globalPacked = packAlchemyPlanResult({ ...counts, 'м¶”м¶ң???¬м„қ??: diluentCount });
  const globalGold = alchemyPlanTotalGold(globalPacked, effects);
  if (globalGold > bestGold) return globalPacked;
  return best;
}

function optimizeAlchemyPlanILP(inv) {
  _lpMatKeys.clear();
  _lpMatSeq = 0;
  const products = [...FINAL_GROUP1, ...FINAL_GROUP2, ...FINAL_GROUP3, 'м¶”м¶ң???¬м„қ??];
  const varIds = products.map((_, i) => 'v' + i);
  const needsList = products.map((name) => buildFinalProductLeafNeeds(name));
  const allMats = new Set();
  needsList.forEach((needs) => Object.keys(needs).forEach((m) => allMats.add(m)));

  const constraints = {};
  allMats.forEach((m) => {
    constraints[lpMaterialKey(m)] = { max: Math.max(0, Number(inv[m]) || 0) };
  });

  const variables = {};
  const ints = {};
  products.forEach((name, i) => {
    const vid = varIds[i];
    const recipe = data.recipes.find((r) => r.name === name);
    variables[vid] = { revenue: getAlchemyBoostedSellPriceGold(recipe) || 0 };
    Object.entries(needsList[i]).forEach(([mat, cnt]) => {
      const c = Number(cnt);
      if (c > 0) variables[vid][lpMaterialKey(mat)] = c;
    });
    ints[vid] = 1;
  });

  if (typeof solver === 'undefined' || !solver || typeof solver.Solve !== 'function') {
    return null;
  }
  if (!Object.keys(constraints).length) {
    return packAlchemyPlanResult(Object.fromEntries(products.map((n) => [n, 0])));
  }

  try {
    const result = solver.Solve({
      optimize: 'revenue',
      opType: 'max',
      constraints,
      variables,
      ints,
    });
    if (!result || result.feasible === false) return null;
    const counts = {};
    products.forEach((name, i) => {
      counts[name] = Math.max(0, Math.floor(Number(result[varIds[i]]) || 0));
    });
    return packAlchemyPlanResult(counts);
  } catch (e) {
    console.warn('[alchemy ILP]', e);
    return null;
  }
}

function optimizeAlchemyPlan(inv, effects) {
  const ilp = optimizeAlchemyPlanILP(inv);
  const greedy = optimizeAlchemyPlanGreedy(inv);
  if (!ilp) return greedy;
  if (!greedy) return ilp;
  return alchemyPlanTotalGold(ilp, effects) >= alchemyPlanTotalGold(greedy, effects) ? ilp : greedy;
}

function alchemyGuideQtyMapsEqual(a, b) {
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  for (const k of keys) {
    const da = a[k] || 0;
    const db = b[k] || 0;
    if (Math.abs(da - db) > 1e-6) return false;
  }
  return true;
}

function alchemyGuideExpandOneLayer(layerMap, options = {}) {
  const skip = options.skipShellfishTierConvert === true;
  const out = {};
  Object.entries(layerMap).forEach(([name, qty]) => {
    if (!qty || qty <= 0) return;
    const mat = data.materials[name];
    if (mat && mat.inputs && mat.inputs.length) {
      if (skip && SHELLFISH_DOWNGRADE_ONE_STAR.has(name)) {
        alchemyGuideMergeQty(out, name, qty);
        return;
      }
      mat.inputs.forEach((inp) => {
        alchemyGuideMergeQty(out, inp.name, (inp.count || 0) * qty);
      });
    } else {
      alchemyGuideMergeQty(out, name, qty);
    }
  });
  return out;
}

function alchemyGuideBuildStages(recipe, copies) {
  const expandOpts = { skipShellfishTierConvert: true };
  let cur = {};
  for (const inp of recipe.inputs) {
    alchemyGuideMergeQty(cur, inp.name, (inp.count || 0) * copies);
  }
  const stages = [alchemyGuideCloneQtyMap(cur)];
  let guard = 0;
  while (guard++ < 48) {
    const next = alchemyGuideExpandOneLayer(cur, expandOpts);
    if (alchemyGuideQtyMapsEqual(cur, next)) break;
    stages.push(alchemyGuideCloneQtyMap(next));
    cur = next;
  }
  return stages;
}

function alchemyGuideDedupeGuideStages(stages) {
  if (!stages || stages.length <= 1) return stages ? stages.slice() : [];

    if (alchemyGuideQtyMapsEqual(prev, cur)) continue;

    out.push(alchemyGuideCloneQtyMap(cur));

}

      [1, 2, 3].forEach((st) => {
        const key = `${base} ${'??.repeat(st)}`;
        const c = req[key] || 0;
        if (c > 0) scores[base] += ue * c;
      });
    });
  });
  return scores;
}

function sumFinalPlanGold(countsByName, effects) {
  const mult = 1 + (effects.alchemyPriceBoost / 100);
  let base = 0;
  let boosted = 0;
  Object.entries(countsByName).forEach(([name, n]) => {
    const r = data.recipes.find((x) => x.name === name);
    if (!r || !n) return;
    base += (r.price || 0) * n;
    boosted += Math.round((r.price || 0) * mult) * n;
  });
  return { base, boosted };
}

// ===== ?¬лЈҢ ?ҳлҹү к°Җ?ёмҳӨкё?(?”лҰ¬ к°Җ??мөңл???кі„мӮ°) =====
function calculateMaxCraft(recipe, inventory, memo = {}, options = {}) {
  if (!recipe.inputs || recipe.inputs.length === 0) {
    return Infinity;
  }
  const skipShell = options.skipShellfishTierConvert === true;

  let maxCount = Infinity;

  for (let input of recipe.inputs) {
    let available = inventory[input.name] || 0;

    if (input.name in data.materials) {
      if (skipShell && SHELLFISH_DOWNGRADE_ONE_STAR.has(input.name)) {
        /* м°Ҫкі ???ҲлҠ” ?ҙлӢ№ ?ұкёүл§??¬мҡ© (?…вҳ…?’вҳ… л¶„н•ҙ ?ңмһ‘ ???? */
      } else {
        const materialRecipe = data.materials[input.name];
        const craftableFromRecipe = calculateMaxCraft(materialRecipe, inventory, memo, options);
        available += craftableFromRecipe;
      }
    }

    const possibleCount = Math.floor(available / input.count);
    maxCount = Math.min(maxCount, possibleCount);
  }

  return maxCount === Infinity ? 0 : maxCount;
}

// ===== мөңмў… ?°л¬ј???„мҡ”??лӘЁл“  ?¬лЈҢ кі„мӮ° =====
function calculateRequiredMaterials(recipe, count, visited = new Set()) {
  const required = {};
  
  if (!recipe.inputs || recipe.inputs.length === 0) {
    return required;
  }
  
  for (let input of recipe.inputs) {
    const neededCount = input.count * count;
    
    if (!required[input.name]) {
      required[input.name] = 0;
    }
    required[input.name] += neededCount;
    
    // мӨ‘к°„ ?¬лЈҢлҘ?л§Ңл“Ө ???ҲлҠ”м§Җ ?•мқё
    if (input.name in data.materials && !visited.has(input.name)) {
      visited.add(input.name);
      const subRequired = calculateRequiredMaterials(data.materials[input.name], neededCount, visited);
      for (let [mat, matCount] of Object.entries(subRequired)) {
        if (!required[mat]) {
          required[mat] = 0;
        }
        required[mat] += matCount;
      }
    }
  }
  
  return required;
}

function analyzeEfficiency() {
  const inventory = getWarehouseInventory();

  const isVanillaCalcOn = vanillaToggle ? vanillaToggle.checked : true;

    renderStaminaPlan();

  }

  if (!isVanillaCalcOn) {
    infiniteVanillaMaterials.forEach(name => {
      inventory[name] = Number.MAX_SAFE_INTEGER;
    });
  }

  const results = [];
  
  const craftNoPromote = { skipShellfishTierConvert: true };

  // к°?мөңмў… ?°л¬ј???Җ??л¶„м„қ
  data.recipes.forEach(recipe => {
    const maxCraft = calculateMaxCraft(recipe, inventory, {}, craftNoPromote);
    
    if (maxCraft > 0) {
      const isAlchemy = /(?¬м„қ?????•мҲҳ|?җм„ј??кІ°м •|?ҳлҰӯ???Ғм•Ҫ|л№„м•Ҫ|мҪ”м–ҙ|?„мҝ ?°мҠӨ|кҙ‘л?мІ?к№ғн„ё|? к°ң|?ҢнҺё|?ҳмҡ°?ёлҹ¬??л¬ҙм?)/.test(recipe.name);

      const adjustedTimeSec = Math.max(1, baseTimeSec * (1 - effects.timeReduce / 100));

      const kind = isAlchemy ? 'alchemy' : (isCraft ? 'craft' : 'other');

async function downloadAlchemyPaneScreenshot() {
  const pane = document.getElementById('effAlchemyPane');
  if (!pane) return;
  if (typeof html2canvas !== 'function') {
    alert('?ҙл?м§Җ ?қм„ұ ?јмқҙлёҢлҹ¬лҰ¬л? л¶Ҳлҹ¬?Өм? лӘ»н–Ҳ?өлӢҲ?? ?ён„°???°кІ° ???ӨмӢң ?ңлҸ„??мЈјм„ё??');
    return;
  }
  const btn = document.getElementById('alchemyScreenshotBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '?қм„ұ мӨ‘вҖ?;
  }
  try {
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
    const canvas = await html2canvas(pane, {
      scale: Math.min(2, window.devicePixelRatio || 2),
      backgroundColor: '#0f0f0f',
      useCORS: true,
      allowTaint: true,
      logging: false,
      ignoreElements: (node) => !!(node.classList && node.classList.contains('alchemy-screenshot-exclude')),
    });
    await new Promise((resolve) => {
      canvas.toBlob((blob) => {
        if (!blob) {
          resolve();
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `?өн????°кёҲ?Ҳкі„??${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.png`;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        resolve();
      }, 'image/png');
    });

function runWhenIdle(fn, timeoutMs) {
  const run = () => {
    try {
      fn();
    } catch (e) {
      console.warn('[Idle]', e);
    }
  };
  const t = timeoutMs != null ? timeoutMs : 1800;
  if (typeof requestIdleCallback === 'function') {
    requestIdleCallback(run, { timeout: t });
  } else {
    setTimeout(run, 1);
  }
}
