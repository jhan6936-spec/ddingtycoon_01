<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 처리 중</title>
  <link rel="icon" href="/assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
</head>
<body style="margin:0;background:#0f0f0f;color:#888;font-family:sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;">
  <p id="msg">로그인 확인 중…</p>
  <script>
(function () {
  function goHome() {
    window.location.replace('/' + window.location.search);
  }
  function fail(msg) {
    var el = document.getElementById('msg');
    if (el) el.textContent = msg || '오류 — 메인으로 이동합니다';
    console.error('[auth/callback]', msg);
    setTimeout(goHome, 1200);
  }
  var cfg = window.SUPABASE_CONFIG;
  var mod = window.supabase;
  var createClient = mod && mod.createClient ? mod.createClient : (mod && mod.default && mod.default.createClient);
  if (!cfg || !cfg.url || !cfg.anonKey || !createClient) return fail('SUPABASE_CONFIG 없음');

  var qs = new URLSearchParams(window.location.search);
  var oauthErr = qs.get('error');
  var oauthDesc = qs.get('error_description');
  if (oauthErr) {
    console.error('[auth/callback] OAuth error:', oauthErr, oauthDesc || '');
    return fail(String(oauthDesc || oauthErr));
  }

  // detectSessionInUrl 과 exchangeCodeForSession 을 동시에 쓰면 PKCE 가 두 번 교환되어
  // code_verifier 가 비는 400(validation_failed)이 날 수 있음 → URL 처리는 수동 교환만 사용.
  var sb = createClient(cfg.url, cfg.anonKey, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      flowType: 'pkce',
      storage: window.localStorage
    }
  });

  var code = qs.get('code');

  function finish() {
    goHome();
  }

  if (code && typeof sb.auth.exchangeCodeForSession === 'function') {
    sb.auth.exchangeCodeForSession(code).then(function (result) {
      if (result && result.error) {
        console.error('[auth/callback] exchangeCodeForSession:', result.error.message, result.error);
        return sb.auth.getSession().then(finish).catch(finish);
      }
      finish();
    }).catch(function (e) {
      console.error('[auth/callback] exchange exception:', e);
      sb.auth.getSession().then(finish).catch(finish);
    });
  } else {
    sb.auth.getSession().then(finish).catch(function (e) {
      console.error('[auth/callback] getSession:', e);
      finish();
    });
  }
})();
  </script>
</body>
</html>
