<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 처리 중</title>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
</head>
<body style="margin:0;background:#0f0f0f;color:#888;font-family:sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;">
  <p id="msg">로그인 확인 중…</p>
  <script>
(function () {
  function goHome() {
    window.location.replace('/');
  }
  function fail(msg) {
    var el = document.getElementById('msg');
    if (el) el.textContent = msg || '오류 — 메인으로 이동합니다';
    console.error('[auth/callback]', msg);
    setTimeout(goHome, 1200);
  }
  var cfg = window.SUPABASE_CONFIG;
  var mod = window.supabase;
  var createClient = mod && mod.createClient ? mod.createClient : (mod && mod.default && mod.default.createClient);
  if (!cfg || !cfg.url || !cfg.anonKey || !createClient) return fail('SUPABASE_CONFIG 없음');

  var sb = createClient(cfg.url, cfg.anonKey, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      flowType: 'pkce',
      storage: window.localStorage
    }
  });

  var href = window.location.href;
  var hasCode = href.indexOf('code=') !== -1;

  function finish() {
    goHome();
  }

  if (hasCode) {
    sb.auth.exchangeCodeForSession(href).then(function (res) {
      if (res.error) {
        console.error('[auth/callback] exchangeCodeForSession:', res.error.message, res.error);
        return sb.auth.getSession().then(finish).catch(finish);
      }
      finish();
    }).catch(function (e) {
      console.error('[auth/callback] exchange exception:', e);
      sb.auth.getSession().then(finish).catch(finish);
    });
  } else {
    sb.auth.getSession().then(finish).catch(function (e) {
      console.error('[auth/callback] getSession:', e);
      finish();
    });
  }
})();
  </script>
</body>
</html>
