<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 처리 중</title>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
</head>
<body style="margin:0;background:#0f0f0f;color:#888;font-family:sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;">
  <p id="msg">로그인 확인 중…</p>
  <script>
(function () {
  var cfg = window.SUPABASE_CONFIG;
  var mod = window.supabase;
  var createClient = mod && mod.createClient ? mod.createClient : (mod && mod.default && mod.default.createClient);
  function goHome() {
    window.location.replace('/');
  }
  function fail() {
    var el = document.getElementById('msg');
    if (el) el.textContent = '설정 오류 — 메인으로 이동합니다';
    setTimeout(goHome, 800);
  }
  if (!cfg || !cfg.url || !cfg.anonKey || !createClient) return fail();
  var sb = createClient(cfg.url, cfg.anonKey, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      flowType: 'pkce',
      storage: window.localStorage
    }
  });
  sb.auth.getSession().then(goHome).catch(function (e) {
    console.error('[auth/callback]', e);
    goHome();
  });
})();
  </script>
</body>
</html>
